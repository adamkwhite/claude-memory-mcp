# Pre-commit hooks configuration
# Automatically runs code quality checks before each commit
# Install: pip install pre-commit && pre-commit install
#          pre-commit install --hook-type pre-push   # enables the blocking mypy-full gate
# Run manually: pre-commit run --all-files
#               pre-commit run --hook-stage pre-push --all-files

# Default every hook to the commit stage. The pre-push gate (mypy-full) opts
# in explicitly via `stages: [pre-push]` below, so nothing else changes speed.
default_stages: [pre-commit]

repos:
  # Python linting and formatting with Ruff (replaces black, flake8, isort)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        name: Lint Python code with Ruff
        # No --fix flag: Match CI behavior (fail on issues, no auto-fix)
      - id: ruff-format
        name: Format Python code with Ruff
        args: [--check]  # Match CI: fail if not formatted

  # Static type checking (commit stage, fast tier).
  # Runs in an isolated env with only the declared additional_dependencies,
  # so it can't see real third-party types for mcp/jsonschema (only
  # pydantic/types-aiofiles are installed here). ignore_missing_imports=true
  # in pyproject.toml papers over that gap for quick per-commit feedback.
  # It is NOT the authoritative gate — that's the `mypy-full` pre-push hook
  # below, which runs in the project venv and sees real installed types.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.0
    hooks:
      - id: mypy
        name: Type check with mypy (fast, isolated env)
        additional_dependencies: [pydantic>=2.0.0, types-aiofiles>=24.1.0]
        args: [--config-file=pyproject.toml]  # Match CI: use project config

  # === Pre-push blocking gate (local, project venv) ===
  # Full-project mypy using the real project venv (sees mcp/jsonschema's
  # actual installed types, not just the fast tier's isolated-env subset).
  # Runs on `git push` only — too slow for every commit — and blocks the
  # push on failure. Repo is mypy-clean as of #163, so a failure here is
  # real signal, not noise. Enable once per clone:
  #   pre-commit install --hook-type pre-push
  # Resolves the venv from the shared .git (--git-common-dir) so the hook
  # works from linked worktrees too, where claude-memory-mcp-venv/ may not
  # exist locally.
  - repo: local
    hooks:
      - id: mypy-full
        name: Type check (full, project venv) — blocking
        entry: bash -c 'exec "$(git rev-parse --git-common-dir)/../claude-memory-mcp-venv/bin/mypy" src tests --config-file=pyproject.toml' --
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Remove trailing whitespace
      - id: end-of-file-fixer
        name: Ensure files end with newline
      - id: check-yaml
        name: Validate YAML files
      - id: check-json
        name: Validate JSON files
      - id: check-added-large-files
        name: Prevent large files (>500KB)
        args: ['--maxkb=500']
      - id: check-merge-conflict
        name: Check for merge conflict markers
      - id: debug-statements
        name: Check for debugger imports

  # Security scanning (high-severity only for speed)
  # Comprehensive scan runs in CI/CD
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        name: Security scan with Bandit (high severity)
        args: [--severity-level, high, -c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]

  # Dependency security
  - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
    rev: v1.3.3
    hooks:
      - id: python-safety-dependencies-check
        name: Check dependencies for vulnerabilities
        files: requirements.*\.txt$

  # Commit message validation (conventional commits)
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.0.0
    hooks:
      - id: conventional-pre-commit
        name: Validate commit message format
        stages: [commit-msg]
        args: [--strict]

# Configuration options

  # Secret scanning — block commits containing API keys, tokens, private keys.
  # Added by add-gitleaks-hook.sh after the 2026-05-10 secret-sprawl audit.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks
        name: Scan for committed secrets (gitleaks)

default_language_version:
  python: python3.12

# Skip hooks for specific commits
# Usage: SKIP=mypy git commit -m "..."
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
