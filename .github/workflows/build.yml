name: Build and analyze

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', '.gitignore', '.github/**']
  pull_request:
    branches:
      - main
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', '.gitignore', '.github/**']

jobs:
  # Stage 1: Quick validation checks (30-60 seconds)
  quick-checks:
    name: Quick Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.14'
          enable-cache: true

      - name: Install linting tools
        run: |
          uv sync --locked --no-build --no-install-project --extra lint
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      # Ruff is the single owner of linting, formatting, and import sorting
      # (replaces black/isort/flake8, which pre-commit had already dropped in
      # favor of ruff — this step used to run a second, conflicting set of
      # tools against the same files). See pyproject.toml [tool.ruff].
      - name: Lint code (Ruff)
        run: |
          ruff check .

      - name: Check code formatting (Ruff)
        run: |
          ruff format --check .

      # Re-enabled: the "separate PR" this was waiting on is #163, which made
      # mypy clean across src/, tests/ and scripts/ (68 files). Uses the project
      # config so CI and the pre-commit hook check the same thing.
      - name: Type checking (Mypy)
        run: |
          mypy --config-file=pyproject.toml src

  # Stage 2: Tests and SonarQube analysis (2-3 minutes)
  sonarqube:
    name: Tests & SonarQube Analysis
    needs: quick-checks  # Only run if quick checks pass
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for SonarQube

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.14'
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --locked --no-build --no-install-project --extra dev
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          # No editable install of our own package: it's local source, not a
          # locked dependency, and a separate `pip install`/`uv pip install`
          # line here trips githubactions:S8544 regardless of flags. src/ on
          # PYTHONPATH is all the tests need (verified).
          echo "PYTHONPATH=$PWD:$PWD/src" >> "$GITHUB_ENV"

      - name: Run tests with coverage
        run: |
         python -m pytest tests/ --ignore=tests/standalone_test.py --ignore=tests/test_performance_benchmarks.py --cov=src --cov-report=xml --cov-report=term

      - name: SonarCloud Scan
        if: github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Clean up build artifacts
        if: always() && github.event_name == 'push'
        run: |
          git checkout -- . || true
          git clean -fd || true
          git status
