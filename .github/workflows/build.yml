name: Build and analyze

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', '.gitignore', '.github/**']
  pull_request:
    branches:
      - main
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', '.gitignore', '.github/**']

jobs:
  # Stage 1: Quick validation checks (30-60 seconds)
  quick-checks:
    name: Quick Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install linting tools
        run: |
          pip install ruff==0.15.0 mypy

      # Ruff is the single owner of linting, formatting, and import sorting
      # (replaces black/isort/flake8, which pre-commit had already dropped in
      # favor of ruff — this step used to run a second, conflicting set of
      # tools against the same files). See pyproject.toml [tool.ruff].
      - name: Lint code (Ruff)
        run: |
          ruff check .

      - name: Check code formatting (Ruff)
        run: |
          ruff format --check .

      - name: Type checking (Mypy)
        if: false  # Temporarily disabled - type errors to be addressed in separate PR
        run: |
          mypy src --ignore-missing-imports

  # Stage 2: Tests and SonarQube analysis (2-3 minutes)
  sonarqube:
    name: Tests & SonarQube Analysis
    needs: quick-checks  # Only run if quick checks pass
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for SonarQube

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        run: |
         PYTHONPATH=. python -m pytest tests/ --ignore=tests/standalone_test.py --ignore=tests/test_performance_benchmarks.py --cov=src --cov-report=xml --cov-report=term

      - name: SonarCloud Scan
        if: github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Clean up build artifacts
        if: always() && github.event_name == 'push'
        run: |
          git checkout -- . || true
          git clean -fd || true
          git status
