name: Build and analyze

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', '.gitignore', '.github/**']
  pull_request:
    branches:
      - main
    # NO paths-ignore here on purpose (mirrors job-agent's ci.yml). A skipped
    # WORKFLOW never reports a required status check, so a docs/.github-only
    # PR would sit at "Expected — waiting for status" forever. Instead the
    # workflow always starts and the `changes` job below decides whether the
    # heavy jobs run; a skipped JOB still reports (passing) to branch
    # protection.
    types: [opened, reopened, ready_for_review, synchronize]

jobs:
  # Mirrors job-agent's `changes` job: always runs, computes whether this PR
  # touches anything beyond docs/config, and gates the heavy jobs below on
  # that plus draft status. See the pull_request trigger comment above for why.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 3
    outputs:
      code: ${{ steps.set.outputs.code }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # `code` = "anything that isn't a docs/config-only change".
      # predicate-quantifier: every is required for the `!` exclusions to
      # bind (default `some` matches `**` trivially and ignores them).
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter_code
        if: github.event_name == 'pull_request'
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!*.md'
              - '!docs/**'
              - '!LICENSE'
              - '!.gitignore'
              - '!.github/**'
      - name: Resolve flags
        id: set
        # Non-PR events (push, workflow_dispatch) have no base to diff
        # against, so default to running everything.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "code=${{ steps.filter_code.outputs.code }}" >> "$GITHUB_OUTPUT"
          else
            echo "code=true" >> "$GITHUB_OUTPUT"
          fi

  # Stage 1: Quick validation checks (30-60 seconds)
  quick-checks:
    name: Quick Validation
    needs: [changes]
    # Skip (-> reports passing) on draft PRs and docs/.github-only PRs; run on
    # push/workflow_dispatch and on non-draft PRs that touch code.
    if: >-
      (github.event.pull_request.draft == false || github.event_name != 'pull_request')
      && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.14'
          enable-cache: true

      - name: Install linting tools
        run: |
          uv sync --locked --no-build --no-install-project --extra lint
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      # Ruff is the single owner of linting, formatting, and import sorting
      # (replaces black/isort/flake8, which pre-commit had already dropped in
      # favor of ruff — this step used to run a second, conflicting set of
      # tools against the same files). See pyproject.toml [tool.ruff].
      - name: Lint code (Ruff)
        run: |
          ruff check .

      - name: Check code formatting (Ruff)
        run: |
          ruff format --check .

      # Re-enabled: the "separate PR" this was waiting on is #163, which made
      # mypy clean across src/, tests/ and scripts/ (68 files). Uses the project
      # config so CI and the pre-commit hook check the same thing.
      - name: Type checking (Mypy)
        run: |
          mypy --config-file=pyproject.toml src

  # Stage 2: Tests and SonarQube analysis (2-3 minutes)
  sonarqube:
    name: Tests & SonarQube Analysis
    needs: [changes, quick-checks]  # Only run if quick checks pass
    # Same gate as quick-checks. quick-checks being skipped would cascade
    # this to skipped anyway (default `needs` behavior), but state it
    # explicitly so the condition is legible without cross-referencing.
    if: >-
      (github.event.pull_request.draft == false || github.event_name != 'pull_request')
      && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for SonarQube

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.14'
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --locked --no-build --no-install-project --extra dev
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          # No editable install of our own package: it's local source, not a
          # locked dependency, and a separate `pip install`/`uv pip install`
          # line here trips githubactions:S8544 regardless of flags. src/ on
          # PYTHONPATH is all the tests need (verified).
          echo "PYTHONPATH=$PWD:$PWD/src" >> "$GITHUB_ENV"

      - name: Run tests with coverage
        run: |
         python -m pytest tests/ --ignore=tests/test_performance_benchmarks.py --cov=src --cov-report=xml --cov-report=term

      - name: SonarCloud Scan
        if: github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Clean up build artifacts
        if: always() && github.event_name == 'push'
        run: |
          git checkout -- . || true
          git clean -fd || true
          git status
