name: Performance Benchmarks

on:
  push:
    branches: [ main ]
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', '.gitignore', '.github/**']
  pull_request:
    branches: [ main ]
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', '.gitignore', '.github/**']
  schedule:
    # Run weekly on Sundays at 6 AM UTC
    - cron: '0 6 * * 0'

jobs:
  performance-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        python-version: '3.14'
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --locked --no-build --no-install-project --extra dev
        echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
        # No editable install of our own package: it's local source, not a
        # locked dependency, and a separate `pip install`/`uv pip install`
        # line here trips githubactions:S8544 regardless of flags. src/ on
        # PYTHONPATH is all these scripts and tests need (verified).
        echo "PYTHONPATH=$PWD:$PWD/src" >> "$GITHUB_ENV"

    - name: Generate test data
      run: |
        python scripts/generate_test_data.py --conversations 159 --clean

    - name: Cache test data
      uses: actions/cache@v4
      with:
        path: ~/claude-memory-test
        key: test-data-159-convs-v1

    - name: Run performance benchmarks
      run: |
        python -m pytest tests/test_performance_benchmarks.py -v --tb=short

    - name: Generate performance report
      run: |
        # Find latest results file
        RESULTS_FILE=$(ls -t benchmark_results/performance_results_*.json | head -1)
        python scripts/generate_performance_report.py "$RESULTS_FILE"

    - name: Upload performance report
      uses: actions/upload-artifact@v4
      with:
        name: performance-report
        path: docs/PERFORMANCE_BENCHMARKS.md

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark_results/

    - name: Check performance regression
      run: |
        # Extract key metrics from the latest run
        RESULTS_FILE=$(ls -t benchmark_results/performance_results_*.json | head -1)

        # Check if search time for 159 conversations exceeds 5 seconds
        SEARCH_TIME=$(python3 -c "
        import json
        with open('$RESULTS_FILE', 'r') as f:
            data = json.load(f)
        readme_results = [r for r in data['results'] if r['operation'] == 'readme_claim_validation']
        if readme_results:
            print(readme_results[0]['duration_seconds'])
        else:
            print('0')
        ")

        echo "Search time for 159 conversations: ${SEARCH_TIME}s"

        # Fail if search takes longer than 5 seconds
        if (( $(echo "$SEARCH_TIME > 5.0" | bc -l) )); then
          echo "❌ Performance regression: Search took ${SEARCH_TIME}s (> 5s threshold)"
          exit 1
        else
          echo "✅ Performance check passed: ${SEARCH_TIME}s < 5s"
        fi

    - name: Comment performance results on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          // Read the performance report
          const report = fs.readFileSync('docs/PERFORMANCE_BENCHMARKS.md', 'utf8');

          // Extract key metrics for comment
          const lines = report.split('\n');
          const summaryStart = lines.findIndex(l => l.includes('## Executive Summary'));
          const summaryEnd = lines.findIndex(l => l.includes('## README Claims Validation'));

          let summary = '';
          if (summaryStart >= 0 && summaryEnd >= 0) {
            summary = lines.slice(summaryStart, summaryEnd).join('\n');
          }

          const comment = `## 🚀 Performance Benchmark Results

          ${summary}

          **Full Report**: See the uploaded artifact for complete details.

          ---
          *Automated performance check completed* ✅`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  performance-comparison:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for comparison

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        python-version: '3.14'
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --locked --no-build --no-install-project --extra dev
        echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
        # No editable install of our own package: it's local source, not a
        # locked dependency, and a separate `pip install`/`uv pip install`
        # line here trips githubactions:S8544 regardless of flags. src/ on
        # PYTHONPATH is all these scripts and tests need (verified). This
        # stays valid across the `git checkout`s below -- they swap file
        # contents in place, not $PWD.
        echo "PYTHONPATH=$PWD:$PWD/src" >> "$GITHUB_ENV"

    - name: Run baseline performance (main branch)
      run: |
        git checkout main
        # NOTE: test_data_path fixture in test_performance_benchmarks.py is
        # hardcoded to ~/claude-memory-test (not configurable) - the dataset
        # must be generated there, not a custom --storage-path, or the test
        # searches an empty auto-created directory and "passes" comparing
        # ~0s against ~0s regardless of real performance.
        python scripts/generate_test_data.py --conversations 159 --clean
        python -m pytest tests/test_performance_benchmarks.py::TestOverallPerformance::test_readme_claims_validation -v --tb=short
        # Rename results
        mkdir -p baseline_results
        mv benchmark_results/* baseline_results/ 2>/dev/null || true

    - name: Run current performance (PR branch)
      run: |
        git checkout ${{ github.event.pull_request.head.sha }}
        python scripts/generate_test_data.py --conversations 159 --clean
        python -m pytest tests/test_performance_benchmarks.py::TestOverallPerformance::test_readme_claims_validation -v --tb=short

    - name: Compare performance
      run: |
        python3 -c "
        import json
        import os

        # Load baseline results
        baseline_files = [f for f in os.listdir('baseline_results') if f.endswith('.json')]
        current_files = [f for f in os.listdir('benchmark_results') if f.endswith('.json')]

        if baseline_files and current_files:
            with open(f'baseline_results/{baseline_files[0]}', 'r') as f:
                baseline = json.load(f)
            with open(f'benchmark_results/{current_files[0]}', 'r') as f:
                current = json.load(f)

            # Extract search times
            baseline_time = next((r['duration_seconds'] for r in baseline['results'] if r['operation'] == 'readme_claim_validation'), 0)
            current_time = next((r['duration_seconds'] for r in current['results'] if r['operation'] == 'readme_claim_validation'), 0)

            if baseline_time > 0:
                change = ((current_time - baseline_time) / baseline_time) * 100
                print(f'Performance change: {change:+.1f}%')
                print(f'Baseline: {baseline_time:.3f}s → Current: {current_time:.3f}s')

                # Threshold rationale: this compares ONE (n=1) ~40ms measurement
                # against a baseline taken on a DIFFERENT shared CI runner, so it is
                # noise-dominated. Observed spread across real runs of this very job:
                # -14.6% and +53.2%, with no code change responsible. A 10% threshold
                # (the original) therefore fires on runner jitter, which is how this
                # job ended up disabled with 'if: false' rather than fixed.
                #
                # The statistically meaningful gate for the README claim is the
                # RELATIVE, same-runner assertion inside test_readme_claims_validation
                # (SQLite vs linear scan on identical data, self-calibrating). This
                # job is the coarse backstop: it should only fire on a gross,
                # unambiguous regression (algorithmic -- a dropped index, an N+1),
                # which is 3x+, not 1.1x.
                if change > 200:
                    print(f'❌ Gross performance regression: {change:+.1f}% slower (>3x)')
                    exit(1)
                elif change < -50:
                    print(f'🚀 Performance improvement: {change:+.1f}% faster')
                else:
                    print(f'✅ Within CI noise band: {change:+.1f}% change (gate fires >200%)')
            else:
                print('No baseline data available for comparison')
        else:
            print('Missing performance data files')
        "
