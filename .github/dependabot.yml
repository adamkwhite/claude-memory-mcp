# GitHub Dependabot configuration for claude-memory-mcp
# MCP server with Python dependencies

version: 2
updates:
  # Python dependencies. Must be "uv", not "pip": CI installs via
  # `uv sync --locked` (#171), so a bump that touches pyproject.toml WITHOUT
  # regenerating uv.lock fails the lockfile-drift guard and the PR can never
  # go green. The pip ecosystem does not know about uv.lock; the uv ecosystem
  # updates pyproject.toml and uv.lock together. (#173/#174 both failed this
  # way -- the guard was right, the config was wrong.)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "adamkwhite"
    assignees:
      - "adamkwhite"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "mcp"
      - "python"
    # Group MCP and related dependencies
    groups:
      mcp-dependencies:
        patterns:
          - "mcp*"
          - "fastmcp*"
        update-types:
          - "minor"
          - "patch"
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff*"
          - "mypy*"
          - "types-*"
        update-types:
          - "minor"
          - "patch"
    allow:
      - dependency-type: "all"
    ignore:
      # Be careful with major MCP framework updates
      - dependency-name: "mcp"
        update-types: ["version-update:semver-major"]
